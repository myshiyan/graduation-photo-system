version: '3'

services:
  graduation-photo:
    build: .
    container_name: graduation-photo
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/graduation_photo.db
